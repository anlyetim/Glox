name: glox
description: "A modern, minimal mobile puzzle game inspired by GNOME Lights Off"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  audioplayers: ^6.1.0
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  # Sound assets - WAV format
  assets:
    - assets/sounds/Pop1.wav
    - assets/sounds/Pop2.wav
    - assets/sounds/Pop3.wav
    - assets/sounds/Pop4.wav
    - assets/sounds/Win.wav
